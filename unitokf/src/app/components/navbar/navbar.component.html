<!-- Add this in the head section of your index.html if not already present -->
<link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">

<nav class="bg-white shadow-md sticky top-0 z-50">
  <div class="max-w-7xl mx-auto px-4">
    <div class="flex justify-between items-center h-16">

      <!-- Left Section (Logo) -->
      <div class="flex items-center space-x-2">
        <span class="text-2xl font-extrabold text-pink-600">UniTok</span>
      </div>

      <!-- Desktop Menu -->
      <div class="hidden md:flex items-center space-x-6">

        <!-- Search -->
        <div class="relative">
          <input
            type="text"
            placeholder="Search explainers..."
            class="w-64 px-4 py-2 rounded-full border border-gray-300 focus:outline-none focus:ring-2 focus:ring-pink-400 pl-10"
          />
          <span class="material-icons absolute left-3 top-2.5 text-gray-400 text-lg">search</span>
        </div>

        <!-- Nav Links -->
        <a routerLink="/home" class="text-gray-600 hover:text-pink-600 font-medium transition flex items-center">
          <span class="material-icons text-lg mr-1">home</span>
          Home
        </a>
        <a routerLink="/explore" class="text-gray-600 hover:text-pink-600 font-medium transition flex items-center">
          <span class="material-icons text-lg mr-1">explore</span>
          Explore
        </a>
        <a routerLink="/my-videos" class="text-gray-600 hover:text-pink-600 font-medium transition flex items-center">
          <span class="material-icons text-lg mr-1">video_library</span>
          My Videos
        </a>

        <!-- Upload Button -->
        <button
          routerLink="/upload"
          class="bg-pink-600 hover:bg-pink-700 text-white px-4 py-2 rounded-full font-semibold transition flex items-center"
        >
          <span class="material-icons text-lg mr-1">upload</span>
          Upload
        </button>

        <!-- Notification -->
        <button class="relative text-gray-600 hover:text-pink-600">
          <span class="material-icons text-2xl">notifications</span>
          <span class="absolute -top-1 -right-1 bg-red-500 text-white text-xs w-4 h-4 flex items-center justify-center rounded-full">
            3
          </span>
        </button>

        <!-- Profile -->
        <div class="relative">
          <img
            src="https://i.pravatar.cc/40"
            alt="profile"
            class="w-9 h-9 rounded-full border-2 border-pink-500 cursor-pointer"
          />
        </div>
      </div>

      <!-- Mobile Menu Button -->
      <div class="md:hidden flex items-center">
        <button (click)="toggleMenu()" class="text-gray-700 focus:outline-none">
          <span class="material-icons text-2xl">menu</span>
        </button>
      </div>

    </div>
  </div>

  <!-- Mobile Dropdown -->
  <div *ngIf="isMenuOpen" class="md:hidden bg-white border-t px-4 pb-4 space-y-3">
    <div class="relative">
      <input
        type="text"
        placeholder="Search explainers..."
        class="w-full px-4 py-2 rounded-full border border-gray-300 focus:outline-none pl-10"
      />
      <span class="material-icons absolute left-3 top-2.5 text-gray-400 text-lg">search</span>
    </div>

    <a routerLink="/home" class="block text-gray-600 py-2 flex items-center">
      <span class="material-icons mr-2">home</span>
      Home
    </a>
    <a routerLink="/explore" class="block text-gray-600 py-2 flex items-center">
      <span class="material-icons mr-2">explore</span>
      Explore
    </a>
    <a routerLink="/my-videos" class="block text-gray-600 py-2 flex items-center">
      <span class="material-icons mr-2">video_library</span>
      My Videos
    </a>

    <button
      routerLink="/upload"
      class="w-full bg-pink-600 text-white py-2 rounded-full flex items-center justify-center"
    >
      <span class="material-icons mr-1">upload</span>
      Upload
    </button>
  </div>
</nav>
