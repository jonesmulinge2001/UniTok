<div
  class="max-w-4xl mx-auto mt-10 bg-white rounded-3xl shadow-2xl overflow-hidden border border-pink-100"
>
  <!-- Cover Photo -->
  <div class="relative h-56 bg-gradient-to-r from-pink-500 via-purple-500 to-indigo-500">
    <label
      class="absolute top-4 right-4 px-4 py-2 bg-black/40 backdrop-blur-md text-white text-xs font-semibold rounded-full cursor-pointer hover:bg-black/60 transition"
    >
      <input
        type="file"
        (change)="onCoverPhotoSelected($event)"
        class="hidden"
      />
      Change Cover
    </label>

    <img
      *ngIf="coverPreview"
      [src]="coverPreview"
      class="absolute inset-0 w-full h-full object-cover"
    />
  </div>

  <!-- Profile Content -->
  <div class="p-8">
    <!-- Profile Image Upload -->
    <div class="flex items-center -mt-20 space-x-5 mb-8">
      <div class="relative w-28 h-28">
        <img
          *ngIf="profilePreview"
          [src]="profilePreview"
          class="w-28 h-28 rounded-full object-cover border-4 border-white shadow-xl ring-4 ring-pink-500"
        />
        <div
          *ngIf="!profilePreview"
          class="w-28 h-28 bg-gradient-to-br from-pink-200 to-purple-300 rounded-full shadow-xl"
        ></div>

        <label
          class="absolute bottom-1 right-1 bg-gradient-to-r from-pink-500 to-purple-500 text-white text-xs px-3 py-1 rounded-full cursor-pointer shadow-lg hover:scale-105 transition"
        >
          <input
            type="file"
            (change)="onProfileImageSelected($event)"
            class="hidden"
          />
          Edit
        </label>
      </div>

      <div class="mt-10">
        <h3 class="text-base font-bold text-gray-800">
          Upload Your Profile Photo
        </h3>
        <p class="text-xs text-gray-500">Less than 2MB</p>
      </div>
    </div>

    <!-- Form Starts -->
    <form
      [formGroup]="profileForm"
      (ngSubmit)="onSubmit()"
      class="grid grid-cols-1 md:grid-cols-2 gap-6"
    >
      <!-- Full Name -->
      <div>
        <label class="block text-sm font-semibold text-gray-700 mb-2">
          Full Name
        </label>
        <input
          formControlName="name"
          type="text"
          placeholder="Natesy"
          class="w-full px-4 py-3 rounded-xl border border-gray-200 bg-gray-50 focus:outline-none focus:ring-2 focus:ring-pink-500 focus:border-pink-500 transition"
        />
      </div>

      <!-- Institution -->
      <div>
        <label class="block text-sm font-semibold text-gray-700 mb-2">
          Institution
        </label>
        <select
          formControlName="institutionId"
          class="w-full px-4 py-3 rounded-xl border border-gray-200 bg-gray-50 focus:outline-none focus:ring-2 focus:ring-purple-500 focus:border-purple-500 transition"
        >
          <option value="" disabled selected>Select your institution</option>
          <option *ngFor="let inst of institutions" [value]="inst.id">
            {{ inst.name }}
          </option>
        </select>
      </div>

      <!-- Academic Level -->
      <div>
        <label class="block text-sm font-semibold text-gray-700 mb-2">
          Education Level
        </label>
        <input
          formControlName="academicLevel"
          type="text"
          placeholder="Year 2"
          class="w-full px-4 py-3 rounded-xl border border-gray-200 bg-gray-50 focus:outline-none focus:ring-2 focus:ring-pink-500 transition"
        />
      </div>

      <!-- Skills -->
      <div>
        <label class="block text-sm font-semibold text-gray-700 mb-2">
          Skills
        </label>
        <input
          formControlName="skills"
          type="text"
          placeholder="Public speaking, AI, Tutoring"
          class="w-full px-4 py-3 rounded-xl border border-gray-200 bg-gray-50 focus:outline-none focus:ring-2 focus:ring-purple-500 transition"
        />
      </div>

      <!-- Interests -->
      <div>
        <label class="block text-sm font-semibold text-gray-700 mb-2">
          Interests
        </label>
        <input
          formControlName="interests"
          type="text"
          placeholder="Math, Music, Travelling"
          class="w-full px-4 py-3 rounded-xl border border-gray-200 bg-gray-50 focus:outline-none focus:ring-2 focus:ring-pink-500 transition"
        />
      </div>

      <!-- Bio -->
      <div class="md:col-span-2">
        <label class="block text-sm font-semibold text-gray-700 mb-2">
          Bio
        </label>
        <textarea
          formControlName="bio"
          rows="4"
          placeholder="Write a short bio about yourself..."
          class="w-full px-4 py-3 rounded-xl border border-gray-200 bg-gray-50 focus:outline-none focus:ring-2 focus:ring-purple-500 transition resize-none"
        ></textarea>
      </div>

      <!-- Submit Button -->
      <div class="md:col-span-2 flex justify-end">
        <button
          type="submit"
          [disabled]="profileForm.invalid"
          class="px-8 py-3 rounded-full font-semibold text-white bg-gradient-to-r from-pink-500 via-purple-500 to-indigo-500 hover:scale-105 hover:shadow-xl transition-all duration-300 disabled:opacity-50 disabled:hover:scale-100"
        >
          Save Profile
        </button>
      </div>
    </form>
  </div>
</div>
