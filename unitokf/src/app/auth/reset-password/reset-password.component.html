<div class="min-h-screen flex items-center justify-center bg-gradient-to-br from-black via-gray-900 to-gray-800 px-4 text-white">

    <div class="w-full max-w-md bg-white/5 backdrop-blur-xl p-8 rounded-3xl shadow-2xl border border-white/10 relative z-10">
  
      <!-- Header -->
      <div class="flex flex-col items-center mb-6 text-center">
        <div class="bg-gradient-to-r from-pink-500 to-cyan-500 rounded-full w-14 h-14 flex items-center justify-center text-white text-2xl font-bold animate-bounce-slow">
          <span class="material-icons">lock_reset</span>
        </div>
        <h2 class="text-2xl font-extrabold mt-4 bg-gradient-to-r from-pink-400 to-cyan-400 bg-clip-text text-transparent">
          Reset Your Password
        </h2>
        <p class="text-sm text-gray-300 mt-1">Enter your email, verification code, and new password.</p>
      </div>
  
      <!-- Reset Password Form -->
      <form [formGroup]="resetForm" (ngSubmit)="onSubmit()">
  
        <!-- Email -->
        <div class="mb-4 relative">
          <label class="block text-sm font-medium mb-1 text-gray-300">Email</label>
          <div class="relative">
            <span class="material-icons absolute left-3 top-3 text-gray-400">alternate_email</span>
            <input
              type="email"
              formControlName="email"
              placeholder="Enter your email"
              class="w-full pl-10 px-4 py-3 rounded-xl border border-white/20 bg-white/10 focus:outline-none focus:ring-2 focus:ring-pink-500 transition placeholder-gray-400"
              [ngClass]="{
                'border-red-500': resetForm.get('email')?.touched && resetForm.get('email')?.invalid,
                'border-white/20': !resetForm.get('email')?.invalid
              }"
            />
          </div>
          <div *ngIf="resetForm.get('email')?.touched && resetForm.get('email')?.invalid" class="text-red-400 text-sm mt-1">
            Valid email is required.
          </div>
        </div>
  
        <!-- Verification Code -->
        <div class="mb-4 relative">
          <label class="block text-sm font-medium mb-1 text-gray-300">Verification Code</label>
          <div class="relative">
            <span class="material-icons absolute left-3 top-3 text-gray-400">confirmation_number</span>
            <input
              type="text"
              formControlName="code"
              placeholder="Enter 5-digit code"
              class="w-full pl-10 px-4 py-3 rounded-xl border border-white/20 bg-white/10 focus:outline-none focus:ring-2 focus:ring-cyan-500 transition placeholder-gray-400"
              [ngClass]="{
                'border-red-500': resetForm.get('code')?.touched && resetForm.get('code')?.invalid,
                'border-white/20': !resetForm.get('code')?.invalid
              }"
            />
          </div>
          <div *ngIf="resetForm.get('code')?.touched && resetForm.get('code')?.invalid" class="text-red-400 text-sm mt-1">
            5-digit code is required.
          </div>
        </div>
  
        <!-- New Password -->
        <div class="mb-6 relative">
          <label class="block text-sm font-medium mb-1 text-gray-300">New Password</label>
          <div class="relative">
            <span class="material-icons absolute left-3 top-3 text-gray-400">lock</span>
            <input
              [type]="showPassword ? 'text' : 'password'"
              formControlName="password"
              placeholder="Enter new password"
              class="w-full pl-10 px-4 py-3 rounded-xl border border-white/20 bg-white/10 focus:outline-none focus:ring-2 focus:ring-purple-500 transition placeholder-gray-400"
              [ngClass]="{
                'border-red-500': resetForm.get('password')?.touched && resetForm.get('password')?.invalid,
                'border-white/20': !resetForm.get('password')?.invalid
              }"
            />
            <span
              class="absolute right-3 top-3 cursor-pointer text-gray-400 hover:text-gray-200"
              (click)="toggleVisibility()"
            >
              <span class="material-icons">{{ showPassword ? 'visibility_off' : 'visibility' }}</span>
            </span>
          </div>
          <div *ngIf="resetForm.get('password')?.touched && resetForm.get('password')?.invalid" class="text-red-400 text-sm mt-1">
            Password must be at least 6 characters.
          </div>
        </div>
  
        <!-- Submit Button -->
        <button
          type="submit"
          [disabled]="authService.loading$ | async"
          class="w-full bg-gradient-to-r from-pink-500 via-purple-500 to-cyan-500 text-white py-3 rounded-xl font-semibold shadow-lg transition-all duration-300 hover:brightness-110 disabled:opacity-50"
        >
          Reset Password
        </button>
  
        <!-- Loading State -->
        <p *ngIf="authService.loading$ | async" class="text-center text-gray-400 text-sm mt-3">Resetting password...</p>
      </form>
    </div>
  </div>
  
  <!-- Tailwind Animations -->
  <style>
    @keyframes bounce-slow { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
    .animate-bounce-slow { animation: bounce-slow 4s infinite; }
  </style>
