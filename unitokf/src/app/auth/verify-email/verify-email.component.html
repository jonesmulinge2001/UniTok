<div class="min-h-screen flex items-center justify-center bg-gradient-to-br from-black via-gray-900 to-gray-800 px-4 text-white">

    <div class="w-full max-w-md bg-white/5 backdrop-blur-xl p-8 rounded-3xl shadow-2xl border border-white/10 relative z-10">
  
      <!-- Header Icon & Title -->
      <div class="flex flex-col items-center mb-6 text-center">
        <div class="bg-gradient-to-r from-pink-500 to-cyan-500 rounded-full w-14 h-14 flex items-center justify-center text-white text-2xl font-bold animate-bounce-slow">
          <span class="material-icons">mark_email_read</span>
        </div>
        <h2 class="text-2xl font-extrabold mt-4 bg-gradient-to-r from-pink-400 to-cyan-400 bg-clip-text text-transparent">
          Verify Your Email
        </h2>
        <p class="text-sm text-gray-300 mt-1">Check your inbox for a 5-digit verification code.</p>
      </div>
  
      <!-- Verification Form -->
      <form [formGroup]="verifyForm" (ngSubmit)="onSubmit()">
  
        <!-- Info Text -->
        <label class="block text-sm font-medium mb-1 text-gray-300">A 5-digit code was sent to:</label>
        <p class="text-cyan-400 font-semibold mb-3">{{ email }}</p>
  
        <!-- Code Input -->
        <div class="mb-4">
          <input
            type="text"
            formControlName="code"
            placeholder="Enter 5-digit code"
            class="w-full px-4 py-3 rounded-xl border border-white/20 bg-white/10 focus:outline-none focus:ring-2 focus:ring-pink-500 transition placeholder-gray-400"
            [ngClass]="{
              'border-red-500': verifyForm.get('code')?.touched && verifyForm.get('code')?.invalid,
              'border-white/20': !verifyForm.get('code')?.invalid
            }"
          />
          <div
            *ngIf="verifyForm.get('code')?.touched && verifyForm.get('code')?.invalid"
            class="text-red-400 text-sm mt-1"
          >
            Code is required and must be 5 digits.
          </div>
        </div>
  
        <!-- Submit Button -->
        <button
          type="submit"
          [disabled]="authService.loading$ | async"
          class="w-full bg-gradient-to-r from-pink-500 via-purple-500 to-cyan-500 text-white py-3 rounded-xl font-semibold shadow-lg transition-all duration-300 hover:brightness-110 disabled:opacity-50"
        >
          Verify Email →
        </button>
      </form>
  
      <!-- Resend Code -->
      <p class="text-sm text-center mt-4 text-gray-400">
        Didn't receive a code?
        <button
          type="button"
          (click)="resendCode()"
          [disabled]="resendDisabled || (authService.loading$ | async)"
          class="text-cyan-400 font-medium hover:underline"
        >
          Resend Code
        </button>
        <span *ngIf="resendDisabled" class="text-gray-500 text-xs ml-2">
          (wait {{ countDown }}s)
        </span>
      </p>
  
      <!-- Loading State -->
      <div *ngIf="authService.loading$ | async" class="text-center mt-4">
        <span class="text-gray-400 text-sm">Please wait...</span>
      </div>
    </div>
  </div>
  
  <!-- Tailwind Animations -->
  <style>
    @keyframes bounce-slow { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
    .animate-bounce-slow { animation: bounce-slow 4s infinite; }
  </style>
